<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TripBook Admin</title>
<style>
:root{--brown:#6b3a2a;--gold:#c8972a;--cream:#fdf6ee;--white:#fff;--border:#e8ddd0;
  --muted:#9e8a78;--red:#c0392b;--amber:#d4830a;--green:#2e7d32;
  --wa:#25D366;--wa-dark:#128C7E;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1a1610;color:#f0e8dc;min-height:100vh}
header{background:#111;padding:0.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold)}
.logo{font-size:1.3rem;font-weight:800;color:#fff}.logo span{color:var(--gold)}
.admin-badge{background:var(--gold);color:#fff;font-size:0.72rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:4px;letter-spacing:1px}

/* LOGIN */
.login-wrap{max-width:360px;margin:5rem auto;padding:1.5rem;background:#26211a;border-radius:14px;border:1px solid #3a3028;box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.login-wrap h2{color:var(--gold);margin-bottom:0.3rem;font-size:1.3rem}
.login-wrap p{color:var(--muted);font-size:0.82rem;margin-bottom:1.5rem}
.input-field{width:100%;padding:0.65rem 0.9rem;border:1px solid #3a3028;border-radius:8px;
  font-size:0.95rem;background:#1a1610;color:#f0e8dc;margin-bottom:0.8rem;font-family:inherit}
.input-field:focus{outline:none;border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.65rem 1.2rem;border-radius:8px;
  font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-gold{background:var(--gold);color:#fff;width:100%;justify-content:center}
.btn-gold:hover{background:#a87820}
.btn-sm{padding:0.35rem 0.8rem;font-size:0.78rem}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid #3a3028}
.btn-ghost:hover{border-color:var(--gold)}
.btn-red{background:#c0392b;color:#fff}
.btn-red:hover{background:#96281b}
.err-msg{color:#e74c3c;font-size:0.82rem;margin-top:0.3rem;min-height:1.2em}
.back-link{display:inline-block;color:var(--muted);font-size:0.8rem;margin-top:1rem;cursor:pointer;text-decoration:underline}
.back-link:hover{color:var(--gold)}

/* DASHBOARD */
#dashboard{display:none;padding:1.2rem 1rem 4rem;max-width:1200px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.7rem;margin-bottom:1.2rem}
.dash-header h2{color:var(--gold);font-size:1.2rem}
.dash-actions{display:flex;gap:0.5rem;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.7rem;margin-bottom:1.2rem}
.stat-card{background:#26211a;border-radius:10px;padding:0.9rem 1rem;border:1px solid #3a3028}
.stat-card strong{display:block;font-size:1.4rem;color:var(--gold)}
.stat-card span{font-size:0.78rem;color:var(--muted)}
.stat-card.warn strong{color:var(--red)}
.stat-card.pend strong{color:var(--amber)}
.search-bar{background:#26211a;border:1px solid #3a3028;border-radius:8px;padding:0.55rem 0.9rem;
  color:#f0e8dc;font-size:0.9rem;width:100%;max-width:320px;font-family:inherit}
.search-bar:focus{outline:none;border-color:var(--gold)}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #3a3028}
table{width:100%;border-collapse:collapse;font-size:0.82rem;background:#1e1a14}
thead th{background:#2e2820;color:var(--gold);padding:0.65rem 0.6rem;text-align:left;white-space:nowrap;font-weight:700;border-bottom:1px solid #3a3028}
tbody td{padding:0.55rem 0.6rem;border-bottom:1px solid #2e2820;vertical-align:middle;color:#d4c4b0}
tbody tr:hover td{background:#26211a}
.s-badge{padding:0.2rem 0.55rem;border-radius:4px;font-size:0.7rem;font-weight:700}
.s-ok{background:#1a3a1a;color:#81c784}
.s-dbl{background:#3a1a1a;color:#ef9a9a}
.wa-link{display:inline-block;background:var(--wa-dark);color:#fff;padding:0.22rem 0.5rem;
  border-radius:4px;font-size:0.72rem;text-decoration:none;white-space:nowrap}
.wa-link:hover{background:#075E54}
.fee-input{width:65px;padding:0.25rem 0.4rem;border:1px solid #3a3028;border-radius:4px;
  font-size:0.78rem;background:#1a1610;color:#f0e8dc}
.set-btn{background:var(--gold);color:#fff;border:none;padding:0.28rem 0.6rem;border-radius:4px;font-size:0.72rem;cursor:pointer;font-weight:700;white-space:nowrap}
.set-btn:hover{background:#a87820}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#26211a;border-radius:12px;padding:1.5rem;max-width:380px;width:100%;border:1px solid #3a3028}
.modal h3{color:var(--gold);margin-bottom:1rem}
</style>
</head>
<body>

<header>
  <div class="logo">Trip<span>Book</span> <span class="admin-badge">ADMIN</span></div>
  <a href="booking.html" style="color:var(--muted);font-size:0.8rem;text-decoration:none">&#8592; Back to Booking Page</a>
</header>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-wrap">
    <h2>&#128274; Admin Login</h2>
    <p>This area is restricted. Enter your password to continue.</p>
    <input class="input-field" type="password" id="adminPass" placeholder="Password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="err-msg" id="loginErr"></div>
    <button class="btn btn-gold" onclick="doLogin()">Login &rarr;</button>
    <div class="back-link" onclick="window.location='booking.html'">&#8592; Go back to booking page</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <h2>&#9881; TripBook Dashboard</h2>
    <div class="dash-actions">
      <input class="search-bar" type="text" placeholder="&#128269; Search bookings..." oninput="renderAdmin(this.value)"/>
      <button class="btn btn-ghost btn-sm" onclick="changeAdminPhone()">&#9999; Phone</button>
      <button class="btn btn-ghost btn-sm" onclick="openPasswordModal()">&#128273; Password</button>
      <button class="btn btn-ghost btn-sm" onclick="exportExcel()">&#128229; Export</button>
      <button class="btn btn-red btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Ref</th><th>Date</th><th>Day</th><th>Name</th>
          <th>WhatsApp</th><th>Route</th><th>Notes</th><th>KM</th>
          <th>Fee Details</th><th>Action</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="adminTbody"></tbody>
    </table>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="modal-overlay" id="passModal">
  <div class="modal">
    <h3>&#128273; Change Password</h3>
    <input class="input-field" type="password" id="curPass" placeholder="Current password"/>
    <input class="input-field" type="password" id="newPass" placeholder="New password (min 6 chars)"/>
    <input class="input-field" type="password" id="conPass" placeholder="Confirm new password"/>
    <div class="err-msg" id="passErr"></div>
    <div style="display:flex;gap:0.6rem;margin-top:0.5rem">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closePasswordModal()">Cancel</button>
      <button class="btn btn-gold" style="flex:1;justify-content:center" onclick="savePassword()">Save</button>
    </div>
  </div>
</div>

  // ── AUTH ────────────────────────────────────────────────────────────────────
  function doLogin(){
    const pass=document.getElementById('adminPass').value;
    if(pass===getAdminPass()){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('dashboard').style.display='block';
      renderAdmin();
    } else {
      document.getElementById('loginErr').textContent='❌ Incorrect password.';
    }
  }
  function doLogout(){
    document.getElementById('dashboard').style.display='none';
    document.getElementById('loginScreen').style.display='block';
    document.getElementById('adminPass').value='';
    document.getElementById('loginErr').textContent='';
  }
  document.getElementById('adminPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

  // ── STATS + TABLE ───────────────────────────────────────────────────────────
  function renderAdmin(search=''){
    let data=[...getPrivate()].sort((a,b)=>a.date>b.date?1:-1);
    if(search){const q=search.toLowerCase();data=data.filter(b=>[b.name,b.from,b.to,b.phone,b.ref,b.notes,b.date].join(' ').toLowerCase().includes(q));}
    const totalRev=data.reduce((s,b)=>s+(+b.total||0),0);
    const doubles=data.filter(b=>b.isDouble).length;
    const pending=data.filter(b=>!b.feeSet).length;
    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-card"><strong>${data.length}</strong><span>Total Bookings</span></div>
      <div class="stat-card"><strong>KSh ${totalRev.toLocaleString()}</strong><span>Total Revenue</span></div>
      <div class="stat-card warn"><strong>${doubles}</strong><span>Double-Bookings ⚠</span></div>
      <div class="stat-card pend"><strong>${pending}</strong><span>Fees Pending ⏳</span></div>
      <div class="stat-card"><strong>+${ADMIN_PHONE}</strong><span>Admin WhatsApp</span></div>`;
    const tbody=document.getElementById('adminTbody');
    if(!data.length){tbody.innerHTML=`<tr><td colspan="12" style="text-align:center;padding:2rem;color:var(--muted)">No bookings found</td></tr>`;return;}
    tbody.innerHTML=data.map((b,i)=>`
      <tr id="row-${b.ref}">
        <td style="color:var(--muted)">${i+1}</td>
        <td style="font-weight:700;color:var(--gold);white-space:nowrap">${b.ref}</td>
        <td style="white-space:nowrap">${b.date}</td>
        <td style="white-space:nowrap">${b.day||'—'}</td>
        <td><strong>${b.name||'—'}</strong></td>
        <td><a class="wa-link" href="https://wa.me/${b.phone}" target="_blank">+${b.phone||'—'}</a></td>
        <td style="white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${b.from||'?'} → ${b.to||'?'}</td>
        <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;color:var(--muted)">${b.notes||'—'}</td>
        <td>${b.feeSet
          ?`<span style="color:var(--gold)">${b.km} km</span>`
          :`<input class="fee-input" type="number" placeholder="KM" value="${b.km||''}" id="km-${b.ref}"/>`
        }</td>
        <td>${b.feeSet
          ?`<strong style="color:#81c784">KSh ${Number(b.total).toLocaleString()}</strong>`
          :`<div style="display:flex;flex-direction:column;gap:3px">
              <input class="fee-input" type="number" placeholder="KSh/km" value="${b.ppkm||50}" id="ppkm-${b.ref}"/>
              <input class="fee-input" type="number" placeholder="Driver" value="${b.driver||1500}" id="drv-${b.ref}"/>
            </div>`
        }</td>
        <td>${b.feeSet
          ?`<a class="wa-link" href="${waLink(b.phone,buildFeeMsg(b))}" target="_blank">💬 Resend</a>`
          :`<button class="set-btn" onclick="saveFee('${b.ref}')">✓ Set & Send</button>`
        }</td>
        <td><span class="s-badge ${b.isDouble?'s-dbl':'s-ok'}">${b.isDouble?'Double':'OK'}</span></td>
      </tr>`).join('');
  }

  function saveFee(ref){
    const all=getPrivate();
    const idx=all.findIndex(b=>b.ref===ref);
    if(idx===-1) return;
    const km=parseFloat(document.getElementById('km-'+ref)?.value)||0;
    const ppkm=parseFloat(document.getElementById('ppkm-'+ref)?.value)||50;
    const drv=parseFloat(document.getElementById('drv-'+ref)?.value)||1500;
    const total=(km*ppkm)+drv;
    all[idx]={...all[idx],km,ppkm,driver:drv,total,feeSet:true};
    localStorage.setItem(PRIVATE_KEY,JSON.stringify(all));
    window.open(waLink(all[idx].phone,buildFeeMsg(all[idx])),'_blank');
    renderAdmin(document.querySelector('.search-bar').value);
  }

  // ── WHATSAPP ────────────────────────────────────────────────────────────────
  function waLink(phone,msg){return`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;}
  function buildFeeMsg(b){
    const d=new Date(b.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    return`🚌 *TripBook — Your Trip Fee*\n\n📋 *Reference:* ${b.ref}\n📅 *Date:* ${d}\n🗺 *Route:* ${b.from||'?'} → ${b.to||'?'}\n📏 *Distance:* ${b.km} km\n💰 *Total Fee: KSh ${Number(b.total).toLocaleString()}*\n\n_Please confirm and prepare payment before the trip date._\nThank you! 🙏`;
  }

  // ── SETTINGS ────────────────────────────────────────────────────────────────
  function changeAdminPhone(){
    const p=prompt('Enter admin WhatsApp number (country code, no + or spaces)\nExample: 254712345678',ADMIN_PHONE);
    if(p&&p.trim()){ADMIN_PHONE=p.trim();localStorage.setItem('tripbook_admin_phone',ADMIN_PHONE);alert('✅ Updated to: +'+ADMIN_PHONE);renderAdmin();}
  }
  function openPasswordModal(){
    ['curPass','newPass','conPass'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('passErr').textContent='';
    document.getElementById('passModal').classList.add('open');
  }
  function closePasswordModal(){ document.getElementById('passModal').classList.remove('open'); }
  function savePassword(){
    const cur=document.getElementById('curPass').value;
    const nw=document.getElementById('newPass').value.trim();
    const cn=document.getElementById('conPass').value;
    if(cur!==getAdminPass()){document.getElementById('passErr').textContent='❌ Current password is wrong.';return;}
    if(nw.length<6){document.getElementById('passErr').textContent='❌ New password must be at least 6 characters.';return;}
    if(nw!==cn){document.getElementById('passErr').textContent='❌ Passwords do not match.';return;}
    localStorage.setItem('tripbook_admin_pass',nw);
    closePasswordModal();
    alert('✅ Password changed! Use your new password next time.');
  }
  document.getElementById('passModal').addEventListener('click',function(e){if(e.target===this)closePasswordModal();});

  // ── EXPORT ──────────────────────────────────────────────────────────────────
  function exportExcel(){
    const data=getPrivate();
    const rows=[['Ref','Date','Day','Name','WhatsApp','From','To','Notes','KM','Price/KM','Driver Fee','Total Fee','Double-Book','Status']];
    data.sort((a,b)=>a.date>b.date?1:-1).forEach(b=>{
      rows.push([b.ref,b.date,b.day,b.name,'+'+b.phone,b.from,b.to,b.notes,b.km,b.ppkm,b.driver,b.total,b.isDouble?'YES':'NO',b.status||'']);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:10},{wch:12},{wch:10},{wch:18},{wch:16},{wch:20},{wch:20},{wch:25},{wch:7},{wch:10},{wch:12},{wch:12},{wch:10},{wch:12}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'Bookings',ws);
    XLSX.writeFile(wb,'TripBookings_'+new Date().toISOString().split('T')[0]+'.xlsx');
  }
